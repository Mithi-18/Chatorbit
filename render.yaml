services:
  - type: web
    name: chatorbit-backend
    env: node
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: ~20
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./dev.db
